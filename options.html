<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Video Speed — Statistics</title>
  <link rel="stylesheet" href="options.css" />
  <link rel="icon" href="icons/icon48.png" />
</head>
<body>
  <header class="options-header">
    <img src="icons/icon48.png" class="header-icon" alt="Smart Video Speed icon" />
    <h1 class="header-title">Smart Video Speed</h1>
    <span class="header-sub">Statistics</span>
  </header>

  <div class="container">
    <h2 class="section-title section-title--top">Time saved — last 7 days</h2>

    <div class="summary">
      <div class="summary-item">
        <span class="summary-value" id="weekTotal">&#8212;</span>
        <span class="summary-label">This week</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="weekAvg">&#8212;</span>
        <span class="summary-label">Daily average</span>
      </div>
      <div class="summary-item">
        <span class="summary-value" id="weekBest">&#8212;</span>
        <span class="summary-label">Best day</span>
      </div>
    </div>

    <div class="chart-wrap">
      <svg id="fullChart" aria-label="Weekly time saved bar chart"></svg>
    </div>

    <hr class="divider" />

    <div class="section-header">
      <h2 class="section-title">Per-site statistics</h2>
      <button id="clearDomainBtn" class="danger-btn">Clear</button>
    </div>

    <div class="table-wrap">
      <table class="domain-table">
        <thead>
          <tr>
            <th>Site</th>
            <th>Saved</th>
            <th>Sessions</th>
            <th>Avg / session</th>
          </tr>
        </thead>
        <tbody id="domainTableBody"></tbody>
      </table>
    </div>

    <hr class="divider" />

    <div class="reset-section">
      <button id="resetStatsBtn" class="reset-stats-btn">Reset all statistics</button>
      <p class="reset-hint">Clears current-video, today, all-time, weekly chart, and per-site counters.</p>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
